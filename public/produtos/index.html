<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos | NT Informática e Celulares</title>
    <meta name="description" content="Vitrine de produtos por categoria da NT Informática e Celulares.">
    <link rel="stylesheet" href="styles.css?v=20260704-1452">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html#produtos">
        <img src="../arena/assets/nt-informatica-logo.jpg" alt="Logo NT Informática">
        <span>
          <strong>NT Informática</strong>
          <small>Produtos por categoria</small>
        </span>
      </a>
      <a class="back-link" href="../index.html#produtos">Voltar ao site</a>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow">Vitrine da loja</p>
        <h1 id="pageTitle">Produtos</h1>
        <p>Escolha uma categoria e veja somente os itens daquele segmento. Preços, fotos e descrições ficam editáveis para o estoque real da loja.</p>
      </section>

      <nav class="category-strip" id="categoryStrip" aria-label="Categorias de produtos"></nav>

      <section class="catalog-head">
        <div>
          <p class="eyebrow">Categoria selecionada</p>
          <h2 id="categoryTitle">Monitores</h2>
        </div>
        <span id="productCount">0 produtos</span>
      </section>

      <section class="product-grid" id="productGrid" aria-label="Produtos da categoria"></section>
    </main>

    <script src="app.js?v=20260707-1230"></script>
  </body>
</html>
